services:
  postgres:
    image: postgres:17
    container_name: pcos-app-postgres
    environment:
      POSTGRES_DB: pcos_app
      POSTGRES_USER: pcos
      POSTGRES_PASSWORD: pcos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcos -d pcos_app"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

